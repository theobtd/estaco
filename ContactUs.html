<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contact Us - Estaco</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --estaco-primary: #8B8E6F;
      --estaco-primary-light: #A7A98C;
      --estaco-secondary: #E2725B;
      --estaco-accent: #A8B8A8;
      --estaco-background: #FFFFFF;
      --estaco-surface: #F9F9F9;
      --estaco-text: #333333;
      --estaco-text-light: #666666;
      --estaco-border: #E0E0E0;
      --estaco-error: #F44336;
      --estaco-success: #4CAF50;
    }

    body {
      font-family: 'Inter', sans-serif;
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      background-color: var(--estaco-background);
      color: var(--estaco-text);
    }

    h1 {
      color: var(--estaco-primary);
      font-weight: 600;
      margin-bottom: 30px;
    }

    button {
      background-color: var(--estaco-accent);
      color: var(--estaco-text);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s;
      width: 100%;
      margin-top: 10px;
    }

    button:active {
      background-color: var(--estaco-primary);
    }

    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: var(--estaco-text-light);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--estaco-border);
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
      margin-bottom: 10px;
    }

    textarea {
      resize: none;
      max-length: 500;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--estaco-primary);
    }

    #error-message {
      color: var(--estaco-error);
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }

    #success-message {
      color: var(--estaco-success);
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }

    .back-button {
      background-color: var(--estaco-border);
      color: var(--estaco-text);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Contact Us</h1>

  <div id="contact-form">
    <div class="form-group">
      <label for="contact-email">Email</label>
      <input type="email" id="contact-email" placeholder="Your email" required>
    </div>
    <div class="form-group">
      <label for="contact-message">Message (max 500 characters)</label>
      <textarea id="contact-message" placeholder="Your message" maxlength="500" required></textarea>
      <div id="char-count" style="text-align: right; font-size: 12px; color: var(--estaco-text-light);">0/500</div>
    </div>
    <button id="send-message-button">Send</button>
    <p id="error-message"></p>
    <p id="success-message"></p>
  </div>

  <button class="back-button" id="back-button">Back</button>

  <script>
    const contactEmail = document.getElementById('contact-email');
    const contactMessage = document.getElementById('contact-message');
    const charCount = document.getElementById('char-count');
    const sendMessageButton = document.getElementById('send-message-button');
    const errorMessage = document.getElementById('error-message');
    const successMessage = document.getElementById('success-message');
    const backButton = document.getElementById('back-button');

    // Update character count
    contactMessage.addEventListener('input', () => {
      const currentLength = contactMessage.value.length;
      charCount.textContent = `${currentLength}/500`;
    });

    // Handle sending the message
    sendMessageButton.addEventListener('click', () => {
      const email = contactEmail.value;
      const message = contactMessage.value;

      if (!email || !message) {
        errorMessage.textContent = 'Please fill in all fields.';
        successMessage.textContent = '';
        return;
      }

      // Here, you would typically send the data to a backend or Firebase.
      // For now, we'll just simulate success.
      errorMessage.textContent = '';
      successMessage.textContent = 'Message sent! We will get back to you soon.';

      // Clear the form
      contactEmail.value = '';
      contactMessage.value = '';
      charCount.textContent = '0/500';

      // Hide success message after 3 seconds
      setTimeout(() => {
        successMessage.textContent = '';
      }, 3000);
    });

    // Handle back button
    backButton.addEventListener('click', () => {
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
