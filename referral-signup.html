<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Join Estaco</title>
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --estaco-primary: #8B8E6F;
      --estaco-primary-light: #A7A98C;
      --estaco-secondary: #E2725B;
      --estaco-accent: #A8B8A8;
      --estaco-background: #FFFFFF;
      --estaco-surface: #F9F9F9;
      --estaco-text: #333333;
      --estaco-text-light: #666666;
      --estaco-border: #E0E0E0;
      --estaco-error: #F44336;
      --estaco-success: #4CAF50;
    }

    body {
      font-family: 'Inter', sans-serif;
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      background-color: var(--estaco-background);
      color: var(--estaco-text);
    }

    h1 { color: var(--estaco-primary); font-weight: 600; margin-bottom: 10px; }
    
    #referral-banner {
      background-color: var(--estaco-surface);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--estaco-accent);
      font-size: 14px;
    }

    #signup-form {
      background-color: var(--estaco-surface);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      text-align: left;
    }

    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; color: var(--estaco-text-light); }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--estaco-border);
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
    }

    button {
      width: 100%;
      background-color: var(--estaco-accent);
      color: var(--estaco-text);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    #error-message { color: var(--estaco-error); font-size: 14px; margin-top: 10px; text-align: center; }
    
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1 data-i18n="Estaco">Estaco</h1>
  
  <div id="referral-banner">
    <span id="welcome-msg" data-i18n="Join your friend on Estaco!" data-referrer-name="your friend">Join your friend on Estaco!</span>
    <p style="font-size: 10px; color: var(--estaco-text-light); margin-top: 8px;">
      <span data-i18n="Inviter ID">Inviter ID</span>: <span id="debug-referrer-uid">None</span>
    </p>
  </div>

  <div id="signup-form">
    <h2 style="margin-top:0" data-i18n="Create Account">Create Account</h2>
    
    <div class="form-group">
      <label for="signup-name" data-i18n="Username">Username</label>
      <input type="text" id="signup-name" data-i18n-placeholder="Choose your username" placeholder="Choose your username" required>
    </div>
  
    <div class="form-group">
      <label for="signup-language" data-i18n="Language">Language</label>
      <select id="signup-language">
        <option value="English" selected data-i18n="English">English</option>
        <option value="French" data-i18n="French">Français</option>
        <option value="Korean" data-i18n="Korean">한국어</option>
      </select>
    </div>
  
    <div class="form-group">
      <label for="signup-email" data-i18n="Email">Email</label>
      <input type="email" id="signup-email" data-i18n-placeholder="Email" placeholder="Email" required>
    </div>
  
    <div class="form-group">
      <label for="signup-email-confirm" data-i18n="Confirm Email">Confirm Email</label>
      <input type="email" id="signup-email-confirm" data-i18n-placeholder="Confirm Email" placeholder="Confirm Email" required>
    </div>
  
    <div class="form-group">
      <label for="signup-password" data-i18n="Password">Password</label>
      <input type="password" id="signup-password" data-i18n-placeholder="Password" placeholder="Password" required>
    </div>
  
    <div class="form-group">
      <label for="signup-password-confirm" data-i18n="Confirm Password">Confirm Password</label>
      <input type="password" id="signup-password-confirm" data-i18n-placeholder="Confirm Password" placeholder="Confirm Password" required>
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" id="accept-terms" required>
        <span data-i18n="I accept the terms of use">
          I accept the <a href="TermsOfUse.html" target="_blank" data-i18n="terms of use">terms of use</a>
        </span>
      </label>
    </div>
  
    <button id="signup-button" data-i18n="Sign Up & Connect">Sign Up & Connect</button>

    <p id="error-message"></p>
  </div>

  <div id="signup-loading" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
    <div style="width:36px;height:36px;border:3px solid var(--estaco-border);border-top-color:var(--estaco-primary);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <p style="margin-top:16px;">Creating account and connecting with friend...</p>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <div style="position: fixed; top: 10px; right: 10px; z-index: 1000;">
    <select id="language-select">
      <option value="English" selected>EN</option>
      <option value="French">FR</option>
      <option value="Korean">KR</option>
    </select>
  </div>

  <!-- Firebase SDKs -->

  <script>

    firebase.initializeApp(firebaseConfig);

    let referrerUid = null;
    let referrerName = "your friend";
    
    async function initializeReferral() {
      const urlParams = new URLSearchParams(window.location.search);
      const refCode = urlParams.get('ref');
      if (!refCode) return;
    
      try {
        const linkQuery = await db.collectionGroup('ReferralLinks')
          .where('linkId', '==', refCode)
          .where('active', '==', true)
          .limit(1)
          .get();
    
        if (!linkQuery.empty) {
          const linkData = linkQuery.docs[0].data();
          
          // Use the data stored directly on the link!
          referrerUid = linkData.referrerUid;
          referrerName = linkData.referrerName;
    
          document.getElementById('welcome-msg').textContent = 
            translations[userLanguage]["Join your friend on Estaco!"].replace("your friend", referrerName);
          document.getElementById('debug-referrer-uid').textContent = referrerUid;
        }
      } catch (error) {
        console.error("Error identifying referrer:", error);
      }
    }
    
    // Run the initialization
    initializeReferral();

        "terms of use": "이용 약관",

        "Email already in use. If you didn't receive a verification email, please <u><strong>check your spam folder</strong></u>.": "이 이메일은 이미 사용 중입니다. 확인 이메일을 받지 못하셨다면 <u><strong>스팸 폴더를 확인해 주세요</strong></u>.",
      }
    };
    
    // 2. The function to swap text
    function updatePageLanguage(language) {
      const lang = translations[language] || translations["English"];
      
      // 1. Update standard text
      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.getAttribute("data-i18n");
        if (lang[key]) {
            // Check if element contains HTML (like the terms link)
            if (element.innerHTML.includes('<a')) {
                 // Skip raw text replacement if it has child nodes we want to preserve, or handle manually
                 // For now, it's safer to only textContent if no children.
            } else {
                 element.textContent = lang[key];
            }
        }
      });
    
      // 2. Update placeholders
      document.querySelectorAll("[data-i18n-placeholder]").forEach((element) => {
        const key = element.getAttribute("data-i18n-placeholder");
        if (lang[key]) element.setAttribute("placeholder", lang[key]);
      });
    
      // 3. Update dynamic Referral Banner
      const welcomeMsg = document.getElementById('welcome-msg');
      const refName = welcomeMsg.getAttribute('data-referrer-name');
      
      if (refName === "your friend") {
        welcomeMsg.textContent = lang["Join your friend on Estaco!"];
      } else {
        // Replace {name} placeholder with the actual name
        let template = lang["Join {name} on Estaco!"];
        welcomeMsg.textContent = template.replace("{name}", refName);
      }
    }
    
    // 3. Event Listener for the top-right menu
    const languageSelect = document.getElementById('language-select');
    languageSelect.addEventListener('change', (event) => {
      userLanguage = event.target.value;
      updatePageLanguage(userLanguage);
    });
    
    // Initialize on load
    updatePageLanguage(userLanguage);

    /**
     * Adds a post to a user's feed sub-collection.
     */
    async function addPostToUserFeed(userId, postId, timestamp) {
      try {
        const feedRef = db.collection(`users/${userId}/feed`).doc(postId);
        await feedRef.set({
          postId: postId,
          postTimestamp: timestamp,
        });
      } catch (error) {
        console.error('Error adding post to user feed:', error);
      }
    }
    
    /**
     * Populates the feeds of two users with the last 10 posts from each other's OwnPosts.
     */
    async function populateFeedsWithExistingPosts(userIdA, userIdB) {
      try {
        // Get the last 10 posts from userIdA's OwnPosts (the Referrer)
        const ownPostsSnapshotA = await db.collection(`users/${userIdA}/OwnPosts`)
          .orderBy('postTimestamp', 'desc')
          .limit(10)
          .get();
        const postsA = ownPostsSnapshotA.docs.map(doc => doc.data());
    
        // Add each post to userIdB's feed (the New User)
        for (const post of postsA) {
          await addPostToUserFeed(userIdB, post.postId, post.postTimestamp);
        }
    
        // Get the last 10 posts from userIdB's OwnPosts (The New User - likely empty, but good for consistency)
        const ownPostsSnapshotB = await db.collection(`users/${userIdB}/OwnPosts`)
          .orderBy('postTimestamp', 'desc')
          .limit(10)
          .get();
        const postsB = ownPostsSnapshotB.docs.map(doc => doc.data());
    
        // Add each post to userIdA's feed (The Referrer)
        for (const post of postsB) {
          await addPostToUserFeed(userIdA, post.postId, post.postTimestamp);
        }
    
        console.log('Feeds populated with the last 10 posts from OwnPosts.');
      } catch (error) {
        console.error('Error populating feeds:', error);
      }
    }

    document.getElementById('signup-button').addEventListener('click', async () => {
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const emailConfirm = document.getElementById('signup-email-confirm').value; 
      const password = document.getElementById('signup-password').value;
      const passwordConfirm = document.getElementById('signup-password-confirm').value; 
      const language = document.getElementById('signup-language').value;
      const acceptTerms = document.getElementById('accept-terms'); 
      const loader = document.getElementById('signup-loading');
      const errorMsg = document.getElementById('error-message');
    
      // 1. Validation Logic
      if (email !== emailConfirm) {
        errorMsg.textContent = translations[userLanguage]["Emails do not match."];
        return;
      }
      if (password !== passwordConfirm) {
        errorMsg.textContent = translations[userLanguage]["Passwords do not match."];
        return;
      }
      if (name.includes(" ")) { 
        errorMsg.textContent = translations[userLanguage]["Username cannot contain spaces."];
        return;
      }
      if (!acceptTerms.checked) {
        errorMsg.textContent = translations[userLanguage]["You must accept the terms of use to proceed."];
        return;
      }
      if (!referrerUid) {
        errorMsg.textContent = translations[userLanguage]["Invalid referral link."];
        return;
      }
    
      loader.style.display = 'flex';
    
      try {
          // 2. Check username uniqueness
          const nameDoc = await db.collection('usernames').where('name', '==', name).get();
          if (!nameDoc.empty) {
            loader.style.display = 'none';
            errorMsg.textContent = translations[userLanguage]["Username is already taken."];
            return;
          }
      
          // 3. Create user
          const userCredential = await auth.createUserWithEmailAndPassword(email, password);
          const user = userCredential.user;
          const newUid = user.uid;
          
          // Update auth profile
          await user.updateProfile({ displayName: name });
      
          // 4. Check referrer's current friend count
          const referrerFriendsDoc = await db.collection('friends').doc(referrerUid).get();
          const referrerFriendsCount = referrerFriendsDoc.exists ? (referrerFriendsDoc.data().friendsList?.length || 0) : 0;
          const isReferrerFull = referrerFriendsCount >= 15;

          // 5. Atomic Batch Write
          const batch = db.batch();
          
          batch.set(db.collection('users').doc(newUid), { name, language, email, profilePictureURL: null });
          batch.set(db.collection('usernames').doc(newUid), { name });

          if (isReferrerFull) {
              // PATH A: Send Request
              const requestRef = db.collection('friendRequests').doc();
              batch.set(requestRef, {
                  from: newUid,
                  to: referrerUid,
                  fromName: name,
                  timestamp: firebase.firestore.FieldValue.serverTimestamp()
              });
              
              const notificationRef = db.collection(`users/${referrerUid}/notifications`).doc();
              batch.set(notificationRef, {
                  type: "friend_request",
                  requesterId: newUid,
                  requesterName: name,
                  timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                  message: `${name} sent you a friend request.` // Consider translating this server-side or on display
              });

              batch.update(db.collection('users').doc(referrerUid), { 
                  NotificationsCounter: firebase.firestore.FieldValue.increment(1) 
              });

              // Initialize the new user's friends doc as empty
              batch.set(db.collection('friends').doc(newUid), { friends: [], friendsList: [] });

          } else {
              // PATH B: Auto-connect
              batch.set(db.collection('friends').doc(referrerUid), {
                  friends: firebase.firestore.FieldValue.arrayUnion({ uid: newUid, name: name }),
                  friendsList: firebase.firestore.FieldValue.arrayUnion(newUid)
              }, { merge: true });
          
              batch.set(db.collection('friends').doc(newUid), {
                  friends: firebase.firestore.FieldValue.arrayUnion({ uid: referrerUid, name: referrerName }),
                  friendsList: firebase.firestore.FieldValue.arrayUnion(referrerUid)
              }, { merge: true });
          }
      
          await batch.commit();
          
          if (!isReferrerFull) {
              try {
                await populateFeedsWithExistingPosts(referrerUid, newUid);
              } catch (e) { console.error(e); }
          }
      
          await user.sendEmailVerification();
          loader.style.display = 'none'; 
          
          // Use translated alerts (add these keys to your translations object!)
          if (isReferrerFull) {
              alert(translations[userLanguage]["Account created! A friend request was sent to your referrer. Check your email to verify."]);
          } else {
              alert(translations[userLanguage]["Account created and friend added! Check your email to verify."]);
          }

          // MOVE REDIRECT HERE so it happens for both paths
          window.location.href = 'index.html';
      
        } catch (error) {
          loader.style.display = 'none';
          
          // Check if the error is the specific Firebase "email taken" error
          if (error.code === 'auth/email-already-in-use') {
            // We use innerHTML here because the translation contains HTML formatting tags
            errorMsg.innerHTML = translations[userLanguage]["Email already in use. If you didn't receive a verification email, please <u><strong>check your spam folder</strong></u>."];
          } else {
            errorMsg.textContent = error.message;
          }
        }
      });

    // Password toggle logic
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });
  </script>
