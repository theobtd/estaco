<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Join Estaco</title>
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --estaco-primary: #8B8E6F;
      --estaco-primary-light: #A7A98C;
      --estaco-secondary: #E2725B;
      --estaco-accent: #A8B8A8;
      --estaco-background: #FFFFFF;
      --estaco-surface: #F9F9F9;
      --estaco-text: #333333;
      --estaco-text-light: #666666;
      --estaco-border: #E0E0E0;
      --estaco-error: #F44336;
      --estaco-success: #4CAF50;
    }

    body {
      font-family: 'Inter', sans-serif;
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      background-color: var(--estaco-background);
      color: var(--estaco-text);
    }

    h1 { color: var(--estaco-primary); font-weight: 600; margin-bottom: 10px; }
    
    #referral-banner {
      background-color: var(--estaco-surface);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--estaco-accent);
      font-size: 14px;
    }

    #signup-form {
      background-color: var(--estaco-surface);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      text-align: left;
    }

    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; color: var(--estaco-text-light); }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--estaco-border);
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
    }

    button {
      width: 100%;
      background-color: var(--estaco-accent);
      color: var(--estaco-text);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    #error-message { color: var(--estaco-error); font-size: 14px; margin-top: 10px; text-align: center; }
    
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1 data-i18n="Estaco">Estaco</h1>
  
  <div id="referral-banner">
    <span id="welcome-msg">Join your friend on Estaco!</span>
    <!-- Added this line below -->
    <p style="font-size: 10px; color: var(--estaco-text-light); margin-top: 8px;">
      Inviter ID: <span id="debug-referrer-uid">None</span>
    </p>
  </div>

  <div id="signup-form">
    <h2 style="margin-top:0" data-i18n="Create Account">Create Account</h2>
    
    <div class="form-group">
      <label for="signup-name" data-i18n="Username">Username</label>
      <input type="text" id="signup-name" placeholder="Choose your username" required>
    </div>
  
    <div class="form-group">
      <label for="signup-language" data-i18n="Language">Language</label>
      <select id="signup-language">
        <option value="English" selected data-i18n="English">English</option>
        <option value="French" data-i18n="French">Français</option>
        <option value="Korean" data-i18n="Korean">한국어</option>
      </select>
    </div>
  
    <div class="form-group">
      <label for="signup-email" data-i18n="Email">Email</label>
      <input type="email" id="signup-email" placeholder="Email" required>
    </div>
  
    <div class="form-group">
      <label for="signup-email-confirm" data-i18n="Confirm Email">Confirm Email</label>
      <input type="email" id="signup-email-confirm" placeholder="Confirm Email" required>
    </div>
  
    <div class="form-group">
      <label for="signup-password" data-i18n="Password">Password</label>
      <input type="password" id="signup-password" placeholder="Password" required>
    </div>
  
    <div class="form-group">
      <label for="signup-password-confirm" data-i18n="Confirm Password">Confirm Password</label>
      <input type="password" id="signup-password-confirm" placeholder="Confirm Password" required>
    </div>
  
    <button id="signup-button" data-i18n="Sign Up & Connect">Sign Up & Connect</button>
  </div>

  <div id="signup-loading" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
    <div style="width:36px;height:36px;border:3px solid var(--estaco-border);border-top-color:var(--estaco-primary);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <p style="margin-top:16px;">Creating account and connecting with friend...</p>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <div style="position: fixed; top: 10px; right: 10px; z-index: 1000;">
    <select id="language-select">
      <option value="English" selected>EN</option>
      <option value="French">FR</option>
      <option value="Korean">KR</option>
    </select>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB1txjASKb_6VPhKBpQh_Y3hoPHsNWwZ_0",
      authDomain: "estaco-add3c.firebaseapp.com",
      projectId: "estaco-add3c",
      storageBucket: "estaco-add3c.firebasestorage.app",
      messagingSenderId: "876337002297",
      appId: "1:876337002297:web:b410c373bd857bc7cd1ae8"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 1. Get Referrer UID from URL (?ref=UID)
    const urlParams = new URLSearchParams(window.location.search);
    const referrerUid = urlParams.get('ref');

    // Display referrer name if possible
    if (referrerUid) {
      // Display the raw UID immediately for your sanity check
      document.getElementById('debug-referrer-uid').innerText = referrerUid;
    
      // Existing logic to fetch the friendly name
      db.collection('usernames').doc(referrerUid).get().then(doc => {
        if (doc.exists) {
          document.getElementById('welcome-msg').innerText = `Join ${doc.data().name} on Estaco!`;
        }
      });
    } else {
      document.getElementById('debug-referrer-uid').innerText = "No ID found in URL";
    }

    let userLanguage = "English";

    // 1. The Dictionary (matches your index.html)
    const translations = {
      English: {
        "Estaco": "Estaco",
        "Create Account": "Create Account",
        "Username": "Username",
        "Language": "Language",
        "Email": "Email",
        "Confirm Email": "Confirm Email",
        "Password": "Password",
        "Confirm Password": "Confirm Password",
        "Sign Up & Connect": "Sign Up & Connect",
        "English": "English",
        "French": "Français",
        "Korean": "한국어",
        "Emails do not match.": "Emails do not match.",
        "Passwords do not match.": "Passwords do not match.",
        "Invalid referral link.": "Invalid referral link."
      },
      French: {
        "Estaco": "Estaco",
        "Create Account": "Créer un compte",
        "Username": "Nom d'utilisateur",
        "Language": "Langue",
        "Email": "Email",
        "Confirm Email": "Confirmer l'email",
        "Password": "Mot de passe",
        "Confirm Password": "Confirmer le mot de passe",
        "Sign Up & Connect": "S'inscrire et se connecter",
        "English": "Anglais",
        "French": "Français",
        "Korean": "Coréen",
        "Emails do not match.": "Les emails ne correspondent pas.",
        "Passwords do not match.": "Les mots de passe ne correspondent pas.",
        "Invalid referral link.": "Lien de parrainage invalide."
      },
      Korean: {
        "Estaco": "에스타코",
        "Create Account": "계정 만들기",
        "Username": "사용자 이름",
        "Language": "언어",
        "Email": "이메일",
        "Confirm Email": "이메일 확인",
        "Password": "비밀번호",
        "Confirm Password": "비밀번호 확인",
        "Sign Up & Connect": "가입 및 연결",
        "English": "영어",
        "French": "프랑스어",
        "Korean": "한국어",
        "Emails do not match.": "이메일이 일치하지 않습니다.",
        "Passwords do not match.": "비밀번호가 일치하지 않습니다.",
        "Invalid referral link.": "유효하지 않은 추천 링크입니다."
      }
    };
    
    // 2. The function to swap text
    function updatePageLanguage(language) {
      const lang = translations[language] || translations["English"];
      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.getAttribute("data-i18n");
        if (lang[key]) {
          element.textContent = lang[key];
        }
      });
    }
    
    // 3. Event Listener for the top-right menu
    const languageSelect = document.getElementById('language-select');
    languageSelect.addEventListener('change', (event) => {
      userLanguage = event.target.value;
      updatePageLanguage(userLanguage);
    });
    
    // Initialize on load
    updatePageLanguage(userLanguage);

    document.getElementById('signup-button').addEventListener('click', async () => {
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const emailConfirm = document.getElementById('signup-email-confirm').value; // Added
      const password = document.getElementById('signup-password').value;
      const passwordConfirm = document.getElementById('signup-password-confirm').value; // Added
      const language = document.getElementById('signup-language').value;
      const acceptTerms = document.getElementById('accept-terms'); // Added
      const loader = document.getElementById('signup-loading');
      const errorMsg = document.getElementById('error-message');
    
      // 1. Validation Logic (Matching index.html)
      if (email !== emailConfirm) {
        errorMsg.textContent = "Emails do not match.";
        return;
      }
      if (password !== passwordConfirm) {
        errorMsg.textContent = "Passwords do not match.";
        return;
      }
      if (name.includes(" ")) { // Simple check for spaces to match isValidUsername
        errorMsg.textContent = "Username cannot contain spaces.";
        return;
      }
      if (!acceptTerms.checked) {
        errorMsg.textContent = "You must accept the terms of use to proceed.";
        return;
      }
      if (!referrerUid) {
        errorMsg.textContent = "Invalid referral link.";
        return;
      }
    
      loader.style.display = 'flex';
    
      try {
        // 2. Check username uniqueness
        const nameDoc = await db.collection('usernames').where('name', '==', name).get();
        if (!nameDoc.empty) throw new Error("Username already taken.");
    
        // 3. Create user
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        const newUid = user.uid;
    
        // Atomic Batch Write (Profile + Friendship)
        const batch = db.batch();
        batch.set(db.collection('users').doc(newUid), { name, language, email, profilePictureURL: null });
        batch.set(db.collection('usernames').doc(newUid), { name });
    
        batch.set(db.collection('users').doc(referrerUid).collection('friends').doc(newUid), { 
          uid: newUid, 
          addedAt: firebase.firestore.FieldValue.serverTimestamp() 
        });
    
        batch.set(db.collection('users').doc(newUid).collection('friends').doc(referrerUid), { 
          uid: referrerUid, 
          addedAt: firebase.firestore.FieldValue.serverTimestamp() 
        });
    
        await batch.commit();
        await user.sendEmailVerification();
    
        alert("Account created and friend added! Check your email to verify.");
        window.location.href = 'index.html';
    
      } catch (error) {
        loader.style.display = 'none';
        errorMsg.textContent = error.message;
      }
    });

    // Password toggle logic
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });
  </script>
</body>
</html>
