<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estaco - Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --estaco-primary: #8B8E6F;
      --estaco-primary-light: #A7A98C;
      --estaco-secondary: #E2725B;
      --estaco-accent: #FFD700;
      --estaco-background: #FFFFFF;
      --estaco-surface: #F9F9F9;
      --estaco-text: #333333;
      --estaco-text-light: #666666;
      --estaco-border: #E0E0E0;
      --estaco-error: #F44336;
      --estaco-success: #4CAF50;
    }
    html, body {
      overflow-x: hidden;
      width: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .notifications-container {
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
      padding: 0 15px;
    }
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      padding-top: 60px;
      padding-bottom: 60px;
      background-color: var(--estaco-background);
    }
    #top-nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 0;
      z-index: 100;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }
    #top-nav-bar h1 {
      margin: 0;
      font-size: 24px;
      color: var(--estaco-primary);
      font-weight: 500;
    }
    #notifications {
      padding: 20px 0; /* Remove horizontal padding */
      width: 100%;
      box-sizing: border-box;
    }
    .notification {
      padding: 15px;
      border: 1px solid var(--estaco-border);
      border-radius: 8px;
      margin-bottom: 10px;
      background: var(--estaco-surface);
      width: 100%;
      box-sizing: border-box;
    }
    .notification-header {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
    }
    .notification-author-picture {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      margin-right: 10px;
      background-color: var(--estaco-primary-light);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }
    .notification-content {
      margin-left: 40px;
      color: var(--estaco-text);
    }
    .notification-post {
      margin-top: 5px;
      font-size: 14px;
      color: var(--estaco-text-light);
    }
    #bottom-nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background-color: white;
      border-top: 1px solid #e0e0e0;
      padding: 8px 0;
      z-index: 100;
      box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.05);
    }
    .nav-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 12px;
      color: #333;
      font-size: 12px;
    }
    .nav-button .icon {
      font-size: 24px;
      margin-bottom: 4px;
    }
    .nav-button .label {
      font-size: 12px;
    }
    #load-more {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      background-color: var(--estaco-primary);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="top-nav-bar">
    <h1 data-i18n="Notifications">Notifications</h1>
  </div>

  <div class="notifications-container">
    <div id="notifications">
      <h3 data-i18n="Your Notifications">Your Notifications</h3>
      <div id="notifications-list"></div>
      <button id="load-more" style="display: none;" data-i18n="Load more">Load more</button>
    </div>
  </div>

  <div id="bottom-nav-bar">
    <button class="nav-button" id="home-button">
      <span class="icon">🏠</span>
      <span class="label" data-i18n="Feed">Feed</span>
    </button>
    <button class="nav-button" id="notifications-button">
      <span class="icon">🔔</span>
      <span class="label" data-i18n="Notifications">Notifications</span>
    </button>
    <button class="nav-button" id="profile-button">
      <span class="icon">👤</span>
      <span class="label" data-i18n="Profile">Profile</span>
    </button>
  </div>

  <script>
    // Disable IndexedDB so Firebase Auth uses localStorage (fixes WKWebView persistence)
    try { Object.defineProperty(window, 'indexedDB', { get: function() { return undefined; }, configurable: true }); } catch(e) {}
    try { if (window.indexedDB) window.indexedDB.open = function() { throw new DOMException('', 'UnknownError'); }; } catch(e) {}
    try { IDBFactory.prototype.open = function() { throw new DOMException('', 'UnknownError'); }; } catch(e) {}
  </script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB1txjASKb_6VPhKBpQh_Y3hoPHsNWwZ_0",
      authDomain: "estaco-add3c.firebaseapp.com",
      projectId: "estaco-add3c",
      storageBucket: "estaco-add3c.firebasestorage.app",
      messagingSenderId: "876337002297",
      appId: "1:876337002297:web:b410c373bd857bc7cd1ae8"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let userLanguage = "English";

    // Try to load the language from localStorage first
    const savedLanguage = localStorage.getItem('userLanguage');
    if (savedLanguage) {
      userLanguage = savedLanguage;
    }

    // Function to update the page language
    function updatePageLanguage(language) {
      const lang = translations[language] || translations["English"];
      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.getAttribute("data-i18n");
        if (lang[key]) {
          element.textContent = lang[key];
        }
      });
    }
    
    // Translations dictionary
    const translations = {
      English: {
        "Notifications": "Notifications",
        "Your Notifications": "Your Notifications",
        "No notifications yet.": "No notifications yet.",
        "Error loading notifications. Please try again.": "Error loading notifications. Please try again.",
        "Liked": "Liked",
        "Loved": "Loved",
        "Laughed at": "Laughed at",
        "Reacted to": "Reacted to",
        "commented on your post": "commented on your post",
        "tagged you in a post": "tagged you in a post",
        "tagged you in a comment": "tagged you in a comment",
        "sent you a friend request": "sent you a friend request",
        "Would you like to accept?": "Would you like to accept?",
        "Load more": "Load more",
        "Feed": "Feed",
        "Profile": "Profile",
        "Please sign in and verify your email to access notifications.": "Please sign in and verify your email to access notifications.",
      },
      French: {
        "Notifications": "Notifications",
        "Your Notifications": "Vos notifications",
        "No notifications yet.": "Aucune notification pour l'instant.",
        "Error loading notifications. Please try again.": "Erreur lors du chargement des notifications. Veuillez réessayer.",
        "Liked": "A aimé",
        "Loved": "A adoré",
        "Laughed at": "A ri à",
        "Reacted to": "A réagi à",
        "commented on your post": "a commenté votre publication",
        "tagged you in a post": "vous a mentionné dans une publication",
        "tagged you in a comment": "vous a mentionné dans un commentaire",
        "sent you a friend request": "vous a envoyé une demande d'ami",
        "Would you like to accept?": "Souhaitez-vous accepter ?",
        "Load more": "Charger plus",
        "Feed": "Fil d'actualité",
        "Profile": "Profil",
        "Please sign in and verify your email to access notifications.": "Veuillez vous connecter et vérifier votre email pour accéder aux notifications.",
      },
      Korean: {
        "Notifications": "알림",
        "Your Notifications": "알림",
        "No notifications yet.": "아직 알림이 없습니다.",
        "Error loading notifications. Please try again.": "알림을 불러오는 중 오류가 발생했습니다. 다시 시도해 주세요.",
        "Liked": "좋아요를 눌렀습니다",
        "Loved": "사랑해요를 눌렀습니다",
        "Laughed at": "웃음을 눌렀습니다",
        "Reacted to": "반응했습니다",
        "commented on your post": "게시물에 댓글을 달았습니다",
        "tagged you in a post": "게시물에서 당신을 태그했습니다",
        "tagged you in a comment": "댓글에서 당신을 태그했습니다",
        "sent you a friend request": "친구 요청을 보냈습니다",
        "Would you like to accept?": "수락하시겠습니까?",
        "Load more": "더 보기",
        "Feed": "피드",
        "Profile": "프로필",
        "Please sign in and verify your email to access notifications.": "알림에 접근하려면 로그인하고 이메일을 인증해 주세요.",
      }
    };

    // DOM elements
    const notificationsList = document.getElementById('notifications-list');

    // Navigate to other pages
    document.getElementById('home-button').addEventListener('click', () => {
      window.location.href = 'home.html';
    });
    document.getElementById('notifications-button').addEventListener('click', () => {
      window.location.href = 'notifications.html';
    });
    document.getElementById('profile-button').addEventListener('click', () => {
      window.location.href = 'profile.html';
    });

    // Check if user is signed in and verified
    auth.onAuthStateChanged((user) => {
      if (!user || !user.emailVerified) {
        alert(translations[userLanguage]["Please sign in and verify your email to access notifications."]);
        window.location.href = 'index.html';
      } else {
        // Load user data from Firestore to get the user's language
        db.collection('users').doc(user.uid).get()
          .then((doc) => {
            if (doc.exists) {
              const userData = doc.data();
              userLanguage = userData.language || "English";
              // Save to localStorage for persistence
              localStorage.setItem('userLanguage', userLanguage);
              updatePageLanguage(userLanguage);
            }
            loadNotifications(user.uid);
          })
          .catch((error) => {
            console.error("Error loading user data:", error);
            loadNotifications(user.uid);
          });
      }
    });

    // Function to load notifications (reactions, comments, and tags)
    let lastVisible = null;
    let isLoading = false;
    
    async function loadNotifications(userId, loadMore = false) {
      if (isLoading) return;
      isLoading = true;
    
      try {
        let query = db.collection(`users/${userId}/notifications`)
          .orderBy('timestamp', 'desc')
          .limit(5);
    
        if (lastVisible && loadMore) {
          query = query.startAfter(lastVisible);
        }
    
        const notificationsSnapshot = await query.get();
    
        if (notificationsSnapshot.empty) {
          if (!loadMore) {
            notificationsList.innerHTML = `<p data-i18n="No notifications yet.">${translations[userLanguage]["No notifications yet."]}</p>`;
          }
          return;
        }
    
        // Process notifications
        const notifications = [];
        for (const notificationDoc of notificationsSnapshot.docs) {
          const notification = notificationDoc.data();
          notifications.push({
            id: notificationDoc.id,
            type: notification.type,
            reactorId: notification.reactorId || notification.taggerId || notification.commenterId || notification.requesterId,
            reactorName: notification.reactorName || notification.taggerName || notification.commenterName || notification.requesterName || "Unknown User",
            postId: notification.postId,
            reaction: notification.reaction,
            commentContent: notification.commentContent,
            message: notification.message,
            timestamp: notification.timestamp,
          });
        }
    
        // Fetch post content for each notification
        for (const notification of notifications) {
          const postDoc = await db.collection('posts').doc(notification.postId).get();
          if (postDoc.exists) {
            notification.postContent = postDoc.data().content;
          } else {
            notification.postContent = "[Post deleted]";
          }
        }
    
        // Render notifications
        const newNotificationsHTML = notifications.map(notification => {
          if (notification.type === 'reaction') {
            return `
              <div class="notification">
                <div class="notification-header">
                  <div class="notification-author-picture" style="background-color: ${getColorFromName(notification.reactorName)};">
                    ${notification.reactorName.charAt(0).toUpperCase()}
                  </div>
                  <strong>${notification.reactorName}</strong>
                  <span style="margin-left: 5px;">
                    ${notification.reaction === 'like' ? translations[userLanguage]["Liked"] :
                      notification.reaction === 'love' ? translations[userLanguage]["Loved"] :
                      notification.reaction === 'laugh' ? translations[userLanguage]["Laughed at"] : translations[userLanguage]["Reacted to"]}
                    your post
                  </span>
                </div>
                <div class="notification-content">
                  <p>${notification.postContent}</p>
                </div>
                <div class="notification-post">
                  ${new Date(notification.timestamp.toDate()).toLocaleString()}
                </div>
              </div>
            `;
          } else if (notification.type === 'comment') {
            return `
              <div class="notification">
                <div class="notification-header">
                  <div class="notification-author-picture" style="background-color: ${getColorFromName(notification.reactorName)};">
                    ${notification.reactorName.charAt(0).toUpperCase()}
                  </div>
                  <strong>${notification.reactorName}</strong>
                  <span style="margin-left: 5px;">${translations[userLanguage]["commented on your post"]}</span>
                </div>
                <div class="notification-content">
                  <p>${notification.postContent}</p>
                  <div style="margin-top: 5px; font-style: italic; color: var(--estaco-text-light);">
                    "${notification.commentContent}"
                  </div>
                </div>
                <div class="notification-post">
                  ${new Date(notification.timestamp.toDate()).toLocaleString()}
                </div>
              </div>
            `;
          } else if (notification.type === 'tag') {
            return `
              <div class="notification">
                <div class="notification-header">
                  <div class="notification-author-picture" style="background-color: ${getColorFromName(notification.reactorName)};">
                    ${notification.reactorName.charAt(0).toUpperCase()}
                  </div>
                  <strong>${notification.reactorName}</strong>
                  <span style="margin-left: 5px;">${translations[userLanguage]["tagged you in a post"]}</span>
                </div>
                <div class="notification-content">
                  <p>${notification.postContent}</p>
                </div>
                <div class="notification-post">
                  ${new Date(notification.timestamp.toDate()).toLocaleString()}
                </div>
              </div>
            `;
          } else if (notification.type === 'comment_tag') {
            return `
              <div class="notification">
                <div class="notification-header">
                  <div class="notification-author-picture" style="background-color: ${getColorFromName(notification.reactorName)};">
                    ${notification.reactorName.charAt(0).toUpperCase()}
                  </div>
                  <strong>${notification.reactorName}</strong>
                  <span style="margin-left: 5px;">${translations[userLanguage]["tagged you in a comment"]}</span>
                </div>
                <div class="notification-content">
                  <p>${notification.postContent}</p>
                </div>
                <div class="notification-post">
                  ${new Date(notification.timestamp.toDate()).toLocaleString()}
                </div>
              </div>
            `;
          } else if (notification.type === 'friend_request') {
            return `
              <div class="notification">
                <div class="notification-header">
                  <div class="notification-author-picture" style="background-color: ${getColorFromName(notification.reactorName)};">
                    ${notification.reactorName.charAt(0).toUpperCase()}
                  </div>
                  <strong>${notification.reactorName}</strong>
                  <span style="margin-left: 5px;">${translations[userLanguage]["sent you a friend request"]}</span>
                </div>
                <div class="notification-content">
                  <p>${translations[userLanguage]["Would you like to accept?"]}</p>
                </div>
                <div class="notification-post">
                  ${new Date(notification.timestamp.toDate()).toLocaleString()}
                </div>
              </div>
            `;
          }
        }).join('');
    
        if (loadMore) {
          notificationsList.innerHTML += newNotificationsHTML;
        } else {
          notificationsList.innerHTML = newNotificationsHTML;
        }
    
        // Show or hide the "Load more" button
        const loadMoreButton = document.getElementById('load-more');
        lastVisible = notificationsSnapshot.docs[notificationsSnapshot.docs.length - 1];
        loadMoreButton.style.display = notifications.length >= 5 ? 'block' : 'none';
    
      } catch (error) {
        console.error("Error loading notifications:", error);
        notificationsList.innerHTML = `<p data-i18n="Error loading notifications. Please try again.">${translations[userLanguage]["Error loading notifications. Please try again."]}</p>`;
      } finally {
        isLoading = false;
      }
    }

    document.getElementById('load-more').addEventListener('click', () => {
      auth.onAuthStateChanged((user) => {
        if (user && user.emailVerified) {
          loadNotifications(user.uid, true);
        }
      });
    });

    function getColorFromName(name) {
      const colors = ['#8B8E6F', '#E2725B', '#A7A98C', '#FFD700', '#6B8E23'];
      const index = name.charCodeAt(0) % colors.length;
      return colors[index];
    }

    // Call updatePageLanguage on page load with the default language
    updatePageLanguage(userLanguage);
  </script>
</body>
</html>
