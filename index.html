<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Estaco</title>
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --estaco-primary: #8B8E6F;
      --estaco-primary-light: #A7A98C;
      --estaco-secondary: #E2725B;
      --estaco-accent: #A8B8A8;
      --estaco-background: #FFFFFF;
      --estaco-surface: #F9F9F9;
      --estaco-text: #333333;
      --estaco-text-light: #666666;
      --estaco-border: #E0E0E0;
      --estaco-error: #F44336;
      --estaco-success: #4CAF50;
    }

    body {
      font-family: 'Inter', sans-serif;
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      background-color: var(--estaco-background);
      color: var(--estaco-text);
    }

    h1 {
      color: var(--estaco-primary);
      font-weight: 600;
      margin-bottom: 30px;
    }

    button {
      background-color: var(--estaco-accent);
      color: var(--estaco-text);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:active {
      background-color: var(--estaco-primary);
    }

    #show-signup, #show-signin {
      width: 100%;
      margin: 10px 0;
    }

    #signup-form, #signin-form {
      background-color: var(--estaco-surface);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      margin-top: 20px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: var(--estaco-text-light);
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--estaco-border);
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--estaco-primary);
    }

    #error-message {
      color: var(--estaco-error);
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: var(--estaco-text-light);
    }
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--estaco-border);
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
      background-color: var(--estaco-surface);
    }
    #language-select {
      width: auto;
      padding: 6px 10px;
      border: 1px solid var(--estaco-border);
      border-radius: 6px;
      background-color: var(--estaco-surface);
      font-family: inherit;
      font-size: 14px;
      color: var(--estaco-text);
      cursor: pointer;
      outline: none;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg fill="%23666666" height="12" viewBox="0 0 24 24" width="12" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 12px;
    }
  </style>
</head>
<body>

  <!-- Sign Up Form -->

    <div class="form-group">

      <input type="text" id="signup-name" placeholder="Choose your username" required>
    </div>
    <div class="form-group">
      <label for="signup-language" data-i18n="Language">Language</label>
      <select id="signup-language" required>
        <option value="English" selected data-i18n="English">English</option>
        <option value="French" data-i18n="French">Français</option>
        <option value="Korean" data-i18n="Korean">한국어</option>
      </select>
    </div>
    <div class="form-group">
      <label for="signup-email" data-i18n="Email">Email</label>
      <input type="email" id="signup-email" placeholder="Email" required>
    </div>
    <div class="form-group">
      <label for="signup-email-confirm" data-i18n="Confirm Email">Confirm Email</label>
      <input type="email" id="signup-email-confirm" placeholder="Confirm Email" required>
    </div>
    <div class="form-group">
      <label for="signup-password" data-i18n="Password">Password</label>
      <div style="position: relative;">
        <input type="password" id="signup-password" placeholder="Password" required>
        <button type="button" class="toggle-password" data-target="signup-password">👁️</button>
      </div>
    </div>
    <div class="form-group">
      <label for="signup-password-confirm" data-i18n="Confirm Password">Confirm Password</label>
      <div style="position: relative;">
        <input type="password" id="signup-password-confirm" placeholder="Confirm Password" required>
        <button type="button" class="toggle-password" data-target="signup-password-confirm">👁️</button>
      </div>
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" id="accept-terms" required>
        <span data-i18n="I accept the terms of use">
          I accept the <a href="TermsOfUse.html" target="_blank" data-i18n="terms of use">terms of use</a>
        </span>
      </label>
    </div>
    <button id="signup-button" data-i18n="Sign Up">Sign Up</button>
    <p id="error-message"></p>
  </div>

  <!-- Sign In Form -->
  <div id="signin-form">
    <h2 data-i18n="Sign In">Sign In</h2>
    <div class="form-group">

      <label for="signin-password" data-i18n="Password">Password</label>

    </div>
    <button id="signin-button" style="width: 100%;" data-i18n="Sign In">Sign In</button>
    <p id="error-message"></p>
  </div>

    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 1000;
  ">

  <script>
    // Force Firebase Auth to use localStorage by making IDB fail immediately.
    // In Median.co WKWebView, IDB opens but loses connection later, causing sign-outs.
    // Firebase Auth catches this throw and falls back to localStorage.
    // Disable IndexedDB so Firebase Auth falls back to localStorage (fixes WKWebView/Median.co persistence)
    (function() {
      var noop = function() { return undefined; };
      var fail = function() { throw new DOMException('', 'UnknownError'); };
      // WebKit/WKWebView: IDL attributes live on Window.prototype — this is the reliable override
      try { Object.defineProperty(Window.prototype, 'indexedDB', { get: noop, configurable: true }); } catch(e) {}
      // Fallback: instance override
      try { Object.defineProperty(window, 'indexedDB', { get: noop, configurable: true }); } catch(e) {}
      // Fallback: patch open() on the instance
      try { if (window.indexedDB) window.indexedDB.open = fail; } catch(e) {}
      // Fallback: patch IDBFactory prototype (standard browsers)
      try { IDBFactory.prototype.open = fail; } catch(e) {}
    })();
  </script>

          if (stored) median.storage.cloud.set({ key: 'fbAuthBackup', value: stored });
        }
        // User is logged in and verified, redirect to feed
        if (window.location.pathname.endsWith('index.html')) {
          window.location.href = 'home.html';
        }
      } else {
        // User is not logged in or not verified, redirect to login
        if (window.location.pathname.endsWith('home.html')) {

        }

    const errorMessage = document.getElementById('error-message');

    showSignup.addEventListener('click', () => {
      signupForm.style.display = 'block';
      signinForm.style.display = 'none';
    });

    showSignin.addEventListener('click', () => {
      signinForm.style.display = 'block';
      signupForm.style.display = 'none';
    });

    signupButton.addEventListener('click', () => {
      const name = document.getElementById('signup-name').value;
      const language = document.getElementById('signup-language').value;
      const email = document.getElementById('signup-email').value;
      const emailConfirm = document.getElementById('signup-email-confirm').value;
      const password = document.getElementById('signup-password').value;
      const passwordConfirm = document.getElementById('signup-password-confirm').value;
      const acceptTerms = document.getElementById('accept-terms');
    
      // Validate inputs
      if (email !== emailConfirm) {
        errorMessage.textContent = translations[userLanguage]["Emails do not match."];
        return;
      }
      if (password !== passwordConfirm) {
        errorMessage.textContent = translations[userLanguage]["Passwords do not match."];
        return;
      }
      if (!isValidUsername(name)) {
        errorMessage.textContent = translations[userLanguage]["Username cannot contain spaces."];
        return;
      }
      if (!acceptTerms.checked) {
        errorMessage.textContent = translations[userLanguage]["You must accept the terms of use to proceed."];
        return;
      }
    
    // Check if the username already exists in the usernames collection
    db.collection('usernames')
      .where('name', '==', name)
      .get()
      .then((querySnapshot) => {
        if (!querySnapshot.empty) {
          errorMessage.textContent = translations[userLanguage]["Username is already taken."];
          return;
        }
    
        // If username is unique, proceed with sign-up
        auth.createUserWithEmailAndPassword(email, password)
          .then((userCredential) => {
            const user = userCredential.user;
            return user.updateProfile({ displayName: name });
          })
          .then(() => {
            const user = auth.currentUser;
            // Write to both users and usernames collections
            const userData = {
              name: name,
              language: language,
              email: email,
              profilePictureURL: null
            };
            return Promise.all([
              db.collection('users').doc(user.uid).set(userData),
              db.collection('usernames').doc(user.uid).set({ name: name })
            ]);
          })
          .then(() => {
            const user = auth.currentUser;
            return user.sendEmailVerification();
          })
          .then(() => {
            alert(translations[userLanguage]["Account created! Please check your email for a verification link. If you don't see it, check your spam folder."]);
            document.getElementById('signup-name').value = '';
            document.getElementById('signup-email').value = '';
            document.getElementById('signup-email-confirm').value = '';
            document.getElementById('signup-password').value = '';
            signupForm.style.display = 'none';
          })
          .catch((error) => {
            errorMessage.textContent = error.message;
          });
      })
      .catch((error) => {
        errorMessage.textContent = 'Error checking username: ' + error.message;
      });
    });

      console.log("here")
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;
      const signinErrorMessage = document.querySelector('#signin-form #error-message');

      auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
        .then(() => auth.signInWithEmailAndPassword(email, password))
        .then((userCredential) => {
          const user = userCredential.user;
          if (user.emailVerified) {
            // Back up the Firebase auth data so WKWebView can restore it
            var fbKey = 'firebase:authUser:' + firebaseConfig.apiKey + ':[DEFAULT]';
            var stored = localStorage.getItem(fbKey);
            if (stored) localStorage.setItem('fbAuthBackup', stored);
            window.location.href = 'home.html';
          } else {
            alert(translations[userLanguage]["Please verify your email before signing in. A verification link has been sent to your email address."]);
            auth.signOut();
          }
        })
        .catch((error) => {
          signinErrorMessage.textContent = error.message;
        });
    });

    function isValidUsername(username) {
      return !/\s/.test(username);
    }

    document.querySelectorAll('.toggle-password').forEach(button => {
      button.addEventListener('click', () => {
        const targetId = button.getAttribute('data-target');
        const passwordInput = document.getElementById(targetId);
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        button.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';

    });

    // Function to update the page language
    function updatePageLanguage(language) {
      const lang = translations[language] || translations["English"];
      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.getAttribute("data-i18n");
        if (lang[key]) {
          element.textContent = lang[key];
        }
      });
    }

    const languageSelect = document.getElementById('language-select');
    languageSelect.addEventListener('change', (event) => {
      userLanguage = event.target.value;
      updatePageLanguage(userLanguage);
    });

    updatePageLanguage(userLanguage);
